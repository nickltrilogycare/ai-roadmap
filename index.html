<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilogy Care — AI Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2563EB;--primary-dark:#1D4ED8;--primary-light:#EFF6FF;--primary-mid:#BFDBFE;
  --dark:#1E3A5F;
  --sidebar:#1E293B;--sidebar-txt:#E2E8F0;--sidebar-hover:#334155;--sidebar-active:#2563EB;
  --bg:#F8FAFC;--white:#FFFFFF;--border:#E2E8F0;
  --text:#0F172A;--text-2:#64748B;--text-3:#94A3B8;
  --success:#22C55E;--warning:#F59E0B;--danger:#EF4444;
  --purple:#8B5CF6;--teal:#06B6D4;--pink:#EC4899;--orange:#F97316;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --sh-lg:0 12px 28px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.06);
  --r:8px;--r2:12px;--tr:.18s ease;
  /* Stage colors */
  --s-backlog:#94A3B8;--s-prioritised:#3B82F6;--s-hold:#F59E0B;
  --s-scoped:#8B5CF6;--s-inbuild:#2563EB;--s-completed:#22C55E;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:14px;line-height:1.5;}
::selection{background:var(--primary);color:#fff;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}

/* SIDEBAR */
.sidebar{width:228px;background:var(--sidebar);color:var(--sidebar-txt);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:width var(--tr);overflow:hidden;flex-shrink:0;}
.sidebar.collapsed{width:58px;}
.sb-head{padding:0 14px;height:60px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sb-logo{font-size:16px;font-weight:800;color:#fff;white-space:nowrap;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;}
.sb-logo .logo-icon{width:28px;height:28px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.sidebar.collapsed .sb-logo-txt{display:none;}
.sb-toggle{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:5px;border-radius:6px;display:flex;align-items:center;margin-left:auto;flex-shrink:0;transition:var(--tr);}
.sb-toggle:hover{background:var(--sidebar-hover);color:#fff;}
.sb-nav{flex:1;padding:8px 6px;overflow-y:auto;}
.nav-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.25);padding:10px 10px 4px;white-space:nowrap;}
.sidebar.collapsed .nav-section{display:none;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:var(--tr);white-space:nowrap;color:rgba(255,255,255,.7);text-decoration:none;margin-bottom:1px;font-size:12.5px;font-weight:500;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--primary);color:#fff;}
.nav-item svg{flex-shrink:0;width:17px;height:17px;opacity:.9;}
.nav-item.active svg{opacity:1;}
.sidebar.collapsed .nav-lbl{display:none;}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.25);white-space:nowrap;}
.sidebar.collapsed .sb-foot span{display:none;}

/* MAIN */
.main-wrap{margin-left:228px;flex:1;min-height:100vh;display:flex;flex-direction:column;transition:margin-left var(--tr);min-width:0;}
.sidebar.collapsed~.main-wrap{margin-left:58px;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;box-shadow:var(--sh-sm);}
.tb-left{display:flex;flex-direction:column;gap:1px;}
.breadcrumb{font-size:10.5px;color:var(--text-2);display:flex;align-items:center;gap:4px;}
.breadcrumb b{color:var(--primary);font-weight:600;}
.page-title{font-size:18px;font-weight:700;color:var(--dark);line-height:1.2;}
.tb-right{display:flex;align-items:center;gap:8px;}

/* SUBVIEW TOGGLE */
.subview-bar{display:flex;gap:0;margin-bottom:18px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm);width:fit-content;}
.sv-btn{padding:7px 16px;font-size:12.5px;font-weight:500;cursor:pointer;transition:var(--tr);color:var(--text-2);border:none;background:none;font-family:inherit;white-space:nowrap;}
.sv-btn:hover{color:var(--text);background:var(--bg);}
.sv-btn.active{background:var(--primary);color:#fff;}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12.5px;font-weight:500;transition:var(--tr);display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-outline{background:var(--white);border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-sm{padding:4px 10px;font-size:11.5px;}
.btn-ghost{background:none;border:none;cursor:pointer;color:var(--text-2);padding:5px;border-radius:6px;display:inline-flex;align-items:center;font-family:inherit;}
.btn-ghost:hover{background:var(--bg);color:var(--text);}

/* CONTENT */
.content{padding:22px 24px;flex:1;width:100%;}
.page{display:none;}
.page.active{display:block;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;background:var(--white);padding:10px 14px;border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh-sm);}
.fl-label{font-size:10px;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;font-weight:700;white-space:nowrap;}
select,.search-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-size:12.5px;outline:none;transition:var(--tr);font-family:inherit;}
select:focus,.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.search-input{width:200px;}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--sh-sm);border-left-width:4px;transition:var(--tr);}
.stat-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.stat-card.c-blue{border-left-color:var(--primary);}
.stat-card.c-green{border-left-color:var(--success);}
.stat-card.c-amber{border-left-color:var(--warning);}
.stat-card.c-purple{border-left-color:var(--purple);}
.stat-card.c-teal{border-left-color:var(--teal);}
.stat-val{font-size:28px;font-weight:800;color:var(--dark);line-height:1;}
.stat-lbl{font-size:10.5px;color:var(--text-2);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.stat-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* BADGES */
.stage-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600;white-space:nowrap;}
.s-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sg-backlog{background:#F1F5F9;color:#475569;}.sg-backlog .s-dot{background:var(--s-backlog);}
.sg-prioritised{background:#EFF6FF;color:#1D4ED8;}.sg-prioritised .s-dot{background:var(--s-prioritised);}
.sg-hold{background:#FFFBEB;color:#92400E;}.sg-hold .s-dot{background:var(--s-hold);}
.sg-scoped{background:#F5F3FF;color:#5B21B6;}.sg-scoped .s-dot{background:var(--s-scoped);}
.sg-inbuild{background:#EFF6FF;color:#1E40AF;}.sg-inbuild .s-dot{background:var(--s-inbuild);}
.sg-completed{background:#F0FDF4;color:#15803D;}.sg-completed .s-dot{background:var(--s-completed);}

.pri-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px;}
.pri-high{background:#FEE2E2;color:#B91C1C;}
.pri-medium{background:#FEF3C7;color:#92400E;}
.pri-low{background:#F0FDF4;color:#15803D;}

.team-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.tb-bizdev{background:#FFF7ED;color:#C2410C;}
.tb-marketing{background:#EFF6FF;color:#1D4ED8;}
.tb-sales{background:#F5F3FF;color:#5B21B6;}
.tb-strategy{background:#F0FDF4;color:#15803D;}

.score-badge{display:inline-flex;align-items:center;justify-content:center;min-width:42px;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;}
.sc-hi{background:#DCFCE7;color:#15803D;}
.sc-mid{background:#FEF3C7;color:#92400E;}
.sc-lo{background:#FEE2E2;color:#B91C1C;}

.qw-badge{background:#F0FDF4;border:1px solid #86EFAC;color:#15803D;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}

/* IMPACT/EFFORT PILLS */
.imp-pill,.eff-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap;display:inline-block;}
.imp-1{background:#F3F4F6;color:#6B7280;}
.imp-2{background:#E0E7FF;color:#3730A3;}
.imp-3{background:#BFDBFE;color:#1E40AF;}
.imp-4{background:#99F6E4;color:#0F766E;}
.imp-5{background:#DCFCE7;color:#15803D;}
.eff-1{background:#DCFCE7;color:#15803D;}
.eff-2{background:#CCFBF1;color:#0F766E;}
.eff-3{background:#FEF3C7;color:#92400E;}
.eff-4{background:#FFEDD5;color:#9A3412;}
.eff-5{background:#FEE2E2;color:#B91C1C;}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh-sm);overflow:hidden;}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;color:var(--dark);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.card-body{padding:16px 18px;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl thead th{background:#F8FAFC;padding:8px 10px;text-align:left;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-2);border-bottom:2px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;z-index:4;}
.tbl thead th:hover{color:var(--primary);}
.tbl thead th.s-asc::after{content:' ▲';font-size:8px;}
.tbl thead th.s-desc::after{content:' ▼';font-size:8px;}
.tbl tbody tr{border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background var(--tr);}
.tbl tbody tr:hover{background:var(--primary-light);}
.tbl td{padding:8px 10px;vertical-align:middle;}
.tbl .nm{font-weight:500;color:var(--dark);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* IMPACT/EFFORT CLICK SCALE */
.scale-btns{display:flex;gap:3px;}
.scale-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:10px;font-weight:700;transition:var(--tr);display:inline-flex;align-items:center;justify-content:center;color:var(--text-2);}
.scale-btn.active-imp-1{background:#F3F4F6;color:#374151;border-color:#9CA3AF;}
.scale-btn.active-imp-2{background:#E0E7FF;color:#3730A3;border-color:#A5B4FC;}
.scale-btn.active-imp-3{background:#BFDBFE;color:#1E40AF;border-color:#93C5FD;}
.scale-btn.active-imp-4{background:#99F6E4;color:#0F766E;border-color:#5EEAD4;}
.scale-btn.active-imp-5{background:#DCFCE7;color:#15803D;border-color:#86EFAC;}
.scale-btn.active-eff-1{background:#DCFCE7;color:#15803D;border-color:#86EFAC;}
.scale-btn.active-eff-2{background:#CCFBF1;color:#0F766E;border-color:#5EEAD4;}
.scale-btn.active-eff-3{background:#FEF3C7;color:#92400E;border-color:#FCD34D;}
.scale-btn.active-eff-4{background:#FFEDD5;color:#9A3412;border-color:#FCA5A1;}
.scale-btn.active-eff-5{background:#FEE2E2;color:#B91C1C;border-color:#FCA5A1;}
.hrs-input{width:60px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;font-size:12px;font-family:inherit;text-align:center;outline:none;}
.hrs-input:focus{border-color:var(--primary);}
.date-input{padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:var(--white);}
.date-input:focus{border-color:var(--primary);}
.stage-select{padding:3px 7px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;font-family:inherit;outline:none;background:var(--white);}

/* ROADMAP LANES */
.h-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
.h-lane{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh-sm);}
.h-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.h-head h3{font-size:13px;font-weight:700;}
.h-now .h-head{border-top:3px solid var(--success);}
.h-now .h-head h3{color:#15803D;}
.h-next .h-head{border-top:3px solid var(--warning);}
.h-next .h-head h3{color:#92400E;}
.h-later .h-head{border-top:3px solid var(--purple);}
.h-later .h-head h3{color:#5B21B6;}
.h-body{padding:8px;}

/* CLUSTER CARDS */
.cl-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all var(--tr);}
.cl-card:hover{border-color:var(--primary);box-shadow:var(--sh-sm);background:var(--white);}
.cl-card.open{border-color:var(--primary);background:var(--primary-light);}
.cl-top{font-size:12.5px;font-weight:600;color:var(--dark);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.cl-arr{font-size:10px;color:var(--text-2);transition:transform var(--tr);}
.cl-card.open .cl-arr{transform:rotate(90deg);}
.cl-meta{display:flex;gap:5px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.cl-prog{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.cl-prog-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.cl-items{margin-top:5px;padding-top:3px;border-top:1px solid rgba(37,99,235,.12);}
.cl-item-row{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;transition:background var(--tr);font-size:11.5px;}
.cl-item-row:hover{background:var(--white);}
.cl-item-row .iid{font-family:monospace;font-size:9px;color:var(--text-3);flex-shrink:0;}
.cl-item-row .inm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dark);font-weight:500;}

/* GANTT */
.gantt-wrap{overflow-x:auto;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh-sm);}
.gantt-header{display:flex;border-bottom:2px solid var(--border);background:#F8FAFC;position:sticky;top:0;z-index:5;}
.gantt-label-col{width:240px;flex-shrink:0;padding:8px 12px;font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;border-right:1px solid var(--border);}
.gantt-months{display:flex;flex:1;}
.gantt-month{flex:1;min-width:70px;padding:8px 6px;font-size:10px;font-weight:600;color:var(--text-2);text-align:center;border-right:1px solid var(--border);}
.gantt-row{display:flex;border-bottom:1px solid #F1F5F9;min-height:36px;align-items:center;position:relative;}
.gantt-row:hover{background:#F8FAFC;}
.gantt-row-label{width:240px;flex-shrink:0;padding:5px 12px;font-size:11.5px;color:var(--text);border-right:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gantt-row-label.cluster-head{background:#F1F5F9;font-weight:700;font-size:11px;color:var(--dark);cursor:pointer;}
.gantt-row-label.cluster-head:hover{background:#E2E8F0;}
.gantt-timeline{flex:1;position:relative;height:36px;}
.gantt-bar{position:absolute;height:22px;top:7px;border-radius:5px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:600;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;transition:filter .15s,transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.gantt-bar:hover{filter:brightness(1.1);transform:scaleY(1.05);z-index:2;}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);z-index:4;opacity:.7;}
.gantt-today-line::after{content:'Today';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--danger);white-space:nowrap;}
.unscheduled-section{margin-top:14px;padding:12px;background:var(--bg);border:1px dashed var(--border);border-radius:var(--r);}
.unscheduled-section h4{font-size:11.5px;font-weight:600;color:var(--text-2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px;}

/* MATRIX / QUADRANT */
.matrix-wrap{position:relative;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh-sm);}
.matrix-inner{position:relative;height:480px;margin:40px 50px 50px 50px;}
.quadrant{position:absolute;border-radius:var(--r);}
.q-tl{top:0;left:0;width:50%;height:50%;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);}
.q-tr{top:0;right:0;width:50%;height:50%;background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.15);}
.q-bl{bottom:0;left:0;width:50%;height:50%;background:rgba(148,163,184,.05);border:1px solid rgba(148,163,184,.15);}
.q-br{bottom:0;right:0;width:50%;height:50%;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.15);}
.q-label{position:absolute;font-size:11px;font-weight:700;padding:4px 8px;border-radius:5px;}
.q-tl .q-label{top:8px;left:8px;color:#15803D;background:rgba(34,197,94,.1);}
.q-tr .q-label{top:8px;right:8px;color:#1E40AF;background:rgba(37,99,235,.1);}
.q-bl .q-label{bottom:8px;left:8px;color:#475569;background:rgba(148,163,184,.15);}
.q-br .q-label{bottom:8px;right:8px;color:#B91C1C;background:rgba(239,68,68,.1);}
.matrix-dot{position:absolute;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,z-index .15s;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.2);border:2px solid rgba(255,255,255,.7);}
.matrix-dot:hover{transform:scale(1.3);z-index:10;}
.matrix-axis-lbl{position:absolute;font-size:10px;font-weight:600;color:var(--text-2);}
.matrix-q-count{font-size:10px;font-weight:600;color:var(--text-2);padding:2px 6px;background:rgba(255,255,255,.8);border-radius:4px;border:1px solid var(--border);}

/* KANBAN */
.kanban-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;}
.kanban-col{flex:0 0 200px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);display:flex;flex-direction:column;max-height:calc(100vh - 220px);}
.kanban-head{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.kanban-head-title{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;}
.kanban-head-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.kanban-head-meta{font-size:10px;color:var(--text-2);}
.kanban-body{flex:1;overflow-y:auto;padding:6px;}
.kanban-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;margin-bottom:5px;cursor:pointer;transition:all var(--tr);box-shadow:var(--sh-sm);}
.kanban-card:hover{border-color:var(--primary);box-shadow:var(--sh-md);}
.kanban-card-name{font-size:11.5px;font-weight:600;color:var(--dark);margin-bottom:5px;line-height:1.4;}
.kanban-card-meta{display:flex;align-items:center;justify-content:space-between;gap:4px;flex-wrap:wrap;}
.kanban-card-arrows{display:flex;gap:3px;margin-top:5px;}
.arrow-btn{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;transition:var(--tr);color:var(--text-2);}
.arrow-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:300;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;backdrop-filter:blur(2px);}
.overlay.on{opacity:1;visibility:visible;}
.drawer{position:fixed;top:0;right:-640px;width:640px;height:100vh;background:var(--white);z-index:301;box-shadow:-8px 0 32px rgba(0,0,0,.12);transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.drawer.on{right:0;}
.dr-head{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dr-title{font-size:16px;font-weight:700;color:var(--dark);line-height:1.3;flex:1;padding-right:12px;}
.dr-badges{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.dr-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.dr-tab{padding:9px 16px;font-size:12.5px;font-weight:500;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;transition:var(--tr);white-space:nowrap;}
.dr-tab:hover{color:var(--text);}
.dr-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--white);}
.dr-body{flex:1;overflow-y:auto;padding:18px 20px;}
.dr-field{margin-bottom:12px;}
.dr-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2);margin-bottom:3px;}
.dr-val{font-size:12.5px;color:var(--text);line-height:1.65;}
.dr-sep{height:1px;background:var(--border);margin:14px 0;}

/* PLANNING SECTION */
.planning-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:var(--bg);border-radius:var(--r2);padding:14px;border:1px solid var(--border);margin-bottom:14px;}
.planning-field{display:flex;flex-direction:column;gap:4px;}
.planning-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-2);}
.priority-score-display{grid-column:span 2;background:var(--primary-light);border:1px solid var(--primary-mid);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.ps-number{font-size:30px;font-weight:800;color:var(--primary);line-height:1;}
.ps-detail{font-size:11px;color:var(--text-2);}

/* BLUEPRINT */
.bp-sec{margin-bottom:13px;}
.bp-lbl{font-size:11px;font-weight:700;color:var(--dark);margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.bp-val{font-size:12.5px;color:var(--text);line-height:1.6;}
.bp-tags{display:flex;gap:4px;flex-wrap:wrap;}
.bp-tag{background:var(--primary-light);color:var(--primary);padding:3px 9px;border-radius:10px;font-size:11.5px;font-weight:500;}
.bp-steps{list-style:none;padding:0;}
.bp-steps li{padding:3px 0 3px 16px;position:relative;font-size:12.5px;color:var(--text);line-height:1.55;}
.bp-steps li::before{content:"→";position:absolute;left:0;color:var(--primary);font-weight:700;}
.effort{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;gap:5px;}
.ef-S{background:#DCFCE7;color:#15803D;}
.ef-M{background:#FEF9C3;color:#854D0E;}
.ef-L{background:#FEE2E2;color:#B91C1C;}
.ef-XL{background:#F3E8FF;color:#6D28D9;}
.ef-ML{background:#FFEDD5;color:#9A3412;}
.qw-box{background:#F0FDF4;border:1px solid #86EFAC;border-radius:var(--r);padding:10px 13px;margin-top:5px;}
.qw-lbl{font-size:9.5px;font-weight:700;color:#15803D;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.qw-txt{font-size:12.5px;color:var(--text);}

/* SCORING */
.sc-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sc-row-lbl{width:90px;font-size:12.5px;font-weight:500;}
.sc-bar-bg{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;cursor:pointer;position:relative;}
.sc-bar-fill{height:100%;border-radius:4px;transition:width .25s;}
.sc-num{width:22px;font-size:13px;font-weight:700;text-align:center;}

/* ORG CHART */
.org-tree{padding:0;}
.org-node{margin-bottom:3px;}
.org-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;cursor:pointer;transition:all var(--tr);}
.org-card:hover{border-color:var(--primary);box-shadow:var(--sh-md);}
.org-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.org-role{font-size:13px;font-weight:600;color:var(--dark);}
.org-name{font-size:11px;color:var(--text-2);margin-top:1px;}
.org-agents{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;max-height:0;overflow:hidden;transition:max-height .35s ease;}
.org-card.open .org-agents{max-height:300px;}
.agent-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;white-space:nowrap;}
.org-children{margin-left:24px;padding-left:12px;border-left:2px solid var(--border);margin-top:2px;}
.org-arr{font-size:10px;color:var(--text-3);transition:transform var(--tr);}
.org-card.open .org-arr{transform:rotate(90deg);}
.lvl-0>.org-card{background:var(--dark);color:#fff;border-color:var(--dark);}
.lvl-0>.org-card .org-role{color:#fff;}
.lvl-0>.org-card .org-name{color:rgba(255,255,255,.6);}
.lvl-0>.org-card .agent-pill{background:rgba(255,255,255,.12);color:#fff;}
.lvl-0>.org-card .org-arr{color:rgba(255,255,255,.4);}
.lvl-1>.org-card{border-left:3px solid var(--primary);}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.donut-legend{display:flex;flex-direction:column;gap:6px;}
.dl-item{display:flex;align-items:center;gap:6px;font-size:12px;}
.dl-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* VOTE */
.vote-btn{background:var(--primary-light);border:1px solid var(--primary);color:var(--primary);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11.5px;font-weight:600;transition:var(--tr);display:inline-flex;align-items:center;gap:4px;font-family:inherit;}
.vote-btn:hover,.vote-btn.voted{background:var(--primary);color:#fff;}
.vote-btn:disabled{opacity:.4;cursor:default;}
.voter-setup{max-width:380px;margin:60px auto;text-align:center;}
.voter-setup h2{font-size:22px;font-weight:700;color:var(--dark);margin-bottom:8px;}
.voter-setup p{color:var(--text-2);margin-bottom:20px;font-size:14px;}
.voter-input{width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:var(--r);font-size:14px;outline:none;font-family:inherit;transition:var(--tr);}
.voter-input:focus{border-color:var(--primary);}
.votes-rem{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;color:var(--primary);}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.lb-rank{font-size:14px;font-weight:700;color:var(--text-3);width:22px;text-align:center;flex-shrink:0;}
.lb-bar{flex:1;min-width:0;}
.lb-name{font-size:12.5px;font-weight:500;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.lb-fill{height:100%;border-radius:3px;background:var(--primary);}
.lb-score{font-size:13px;font-weight:700;color:var(--primary);flex-shrink:0;}

/* DROPDOWN */
.dd-wrap{position:relative;display:inline-block;}
.dd-menu{position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-lg);z-index:50;display:none;min-width:160px;padding:4px;}
.dd-menu.on{display:block;}
.dd-opt{padding:6px 10px;cursor:pointer;border-radius:5px;font-size:12.5px;display:flex;align-items:center;gap:5px;}
.dd-opt:hover{background:var(--bg);}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* STRATEGY PAGE */
.vision-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.vision-pct{font-size:13px;font-weight:700;color:var(--dark);width:44px;flex-shrink:0;}
.vision-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.vision-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--primary),var(--teal));}
.vision-label{font-size:12.5px;color:var(--text);width:200px;}
.gap-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:16px;box-shadow:var(--sh-sm);border-left:4px solid var(--danger);transition:var(--tr);}
.gap-card:hover{box-shadow:var(--sh-md);}
.gap-num{font-size:11px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.gap-title{font-size:13.5px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.gap-text{font-size:12px;color:var(--text-2);line-height:1.6;}
.roi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:20px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;}
.roi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--teal));}
.roi-stat{font-size:26px;font-weight:800;color:var(--primary);line-height:1;margin-bottom:5px;}
.roi-detail{font-size:12px;color:var(--text);font-weight:500;line-height:1.5;margin-bottom:8px;}
.roi-source{font-size:10px;color:var(--text-3);font-style:italic;}
.phase-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px;box-shadow:var(--sh-sm);border-top:4px solid var(--primary);}
.phase-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--primary);margin-bottom:4px;}
.phase-title{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:10px;}
.phase-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:12px;color:var(--text);}
.phase-item::before{content:"✦";color:var(--primary);font-size:9px;margin-top:2px;flex-shrink:0;}
.team-ai-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:16px;box-shadow:var(--sh-sm);text-align:center;}
.team-ai-icon{font-size:28px;margin-bottom:8px;}
.team-ai-role{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.team-ai-desc{font-size:11.5px;color:var(--text-2);line-height:1.5;}
.str-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px;box-shadow:var(--sh-sm);margin-bottom:12px;border-left:4px solid var(--teal);}
.str-id{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.str-title{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px;}
.str-section{margin-bottom:10px;}
.str-section-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-2);margin-bottom:3px;}
.str-section-val{font-size:12.5px;color:var(--text);line-height:1.6;}

/* TOOLTIP */
.tt{position:absolute;background:#1E293B;color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;pointer-events:none;z-index:20;white-space:nowrap;box-shadow:var(--sh-lg);line-height:1.5;}
.tt-title{font-weight:700;margin-bottom:2px;}

/* SCATTER */
.scatter-wrap{position:relative;height:340px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);}
.scatter-dot{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;cursor:pointer;transition:transform .15s;z-index:2;box-shadow:var(--sh-md);}
.scatter-dot:hover{transform:scale(1.3);z-index:5;}

/* STRATEGIC ALIGNMENT TAGS */
.sa-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap;}
.sa-tsunami{background:#FEF9C3;color:#854D0E;border:1px solid #FDE68A;}
.sa-foundations{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;}
.sa-scale{background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE;}
.sa-net-new{background:#FDF2F8;color:#9D174D;border:1px solid #FBCFE8;}
.sa-acquisition{background:#CCFBF1;color:#0F766E;border:1px solid #99F6E4;}
.sa-retention{background:#DCFCE7;color:#15803D;border:1px solid #86EFAC;}
.sa-efficiency{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;}
.sa-partnerships{background:#FFEDD5;color:#9A3412;border:1px solid #FED7AA;}

/* PILLAR CARDS */
.pillar-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px;box-shadow:var(--sh-sm);border-top-width:4px;transition:var(--tr);}
.pillar-card:hover{box-shadow:var(--sh-md);}
.pillar-icon{font-size:26px;margin-bottom:8px;}
.pillar-name{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.pillar-desc{font-size:11.5px;color:var(--text-2);margin-bottom:10px;line-height:1.45;}
.pillar-count{font-size:22px;font-weight:800;color:var(--dark);line-height:1;}
.pillar-count-lbl{font-size:10px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.pillar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0;}
.pillar-fill{height:100%;border-radius:3px;}
.pillar-top-item{font-size:11.5px;color:var(--text);padding:3px 0;display:flex;align-items:center;gap:5px;cursor:pointer;border-radius:4px;}
.pillar-top-item:hover{color:var(--primary);}
.pillar-top-item::before{content:'›';color:var(--text-2);font-weight:700;}

/* TSUNAMI / FOUNDATIONS */
.tsunami-col{background:linear-gradient(135deg,#FFFDE7,#FFF8E1);border:2px solid #FDE68A;border-radius:var(--r2);padding:18px;}
.foundations-col{background:linear-gradient(135deg,#EFF6FF,#EBF4FF);border:2px solid #BFDBFE;border-radius:var(--r2);padding:18px;}
.align-col-head{font-size:13.5px;font-weight:800;margin-bottom:3px;}
.align-col-sub{font-size:11px;color:var(--text-2);margin-bottom:12px;font-style:italic;}
.align-col-stats{display:flex;gap:14px;margin-bottom:12px;padding:8px 10px;background:rgba(255,255,255,.6);border-radius:var(--r);flex-wrap:wrap;}
.align-stat{font-size:10.5px;color:var(--text-2);}
.align-stat strong{color:var(--text);font-size:14px;display:block;line-height:1.1;}
.align-item-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background var(--tr);background:rgba(255,255,255,.5);margin-bottom:4px;}
.align-item-row:hover{background:rgba(255,255,255,.9);}
.align-item-name{font-size:12px;font-weight:500;color:var(--dark);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* SCALE / NET NEW COMPACT CARDS */
.horizon-item-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all var(--tr);box-shadow:var(--sh-sm);}
.horizon-item-card:hover{border-color:var(--primary);box-shadow:var(--sh-md);}
.horizon-item-card .hin{font-size:12px;font-weight:600;color:var(--dark);margin-bottom:5px;line-height:1.4;}
.horizon-item-card .him{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}

/* HEATMAP */
.heatmap-table{width:100%;border-collapse:collapse;font-size:12px;}
.heatmap-table th{padding:7px 10px;text-align:center;font-weight:600;font-size:10.5px;color:var(--text-2);text-transform:uppercase;letter-spacing:.3px;background:var(--bg);border:1px solid var(--border);}
.heatmap-table th:first-child{text-align:left;}
.heatmap-table td{padding:8px 10px;text-align:center;border:1px solid var(--border);font-weight:700;font-size:12px;}
.heatmap-table td:first-child{text-align:left;font-weight:600;color:var(--dark);background:var(--bg);}
.hm-0{background:#F8FAFC;color:var(--text-3);}
.hm-1{background:#DBEAFE;color:#1E40AF;}
.hm-2{background:#BFDBFE;color:#1D4ED8;}
.hm-3{background:#93C5FD;color:#1E3A8A;}
.hm-4{background:#60A5FA;color:#fff;}
.hm-5{background:#3B82F6;color:#fff;}
.hm-6{background:#2563EB;color:#fff;}
.hm-hi{background:#1D4ED8;color:#fff;}

/* ALIGNMENT GAP ALERTS */
.align-alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--r);margin-bottom:8px;border:1px solid;}
.align-alert.green{background:#F0FDF4;border-color:#86EFAC;}
.align-alert.yellow{background:#FFFDE7;border-color:#FDE68A;}
.align-alert.red{background:#FEF2F2;border-color:#FECACA;}
.align-alert-icon{font-size:16px;flex-shrink:0;}
.align-alert-text{font-size:12.5px;color:var(--text);line-height:1.6;}
.align-alert-text strong{color:var(--dark);}

/* PRINT */
@media print{
  .sidebar,.topbar,.filter-bar,.overlay,.drawer,.btn,.subview-bar{display:none!important;}
  .main-wrap{margin-left:0!important;}
  .content{padding:0!important;}
  .h-grid{grid-template-columns:1fr!important;}
  .cl-card{break-inside:avoid;}
}
@media(max-width:1100px){
  .h-grid{grid-template-columns:1fr;}
  .two-col{grid-template-columns:1fr;}
  .three-col{grid-template-columns:1fr 1fr;}
  .drawer{width:100%;right:-100%;}
}
@media(max-width:768px){
  .sidebar{width:58px;}
  .sidebar .nav-lbl,.sb-logo-txt,.sb-foot span,.nav-section{display:none;}
  .main-wrap{margin-left:58px;}
  .three-col{grid-template-columns:1fr;}
}
</style>
</head>

      <span class="nav-lbl">Dashboard</span>
    </button>
    <button class="nav-item" data-pg="roadmap" onclick="go('roadmap')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-8"/></svg>
      <span class="nav-lbl">Roadmap</span>
    </button>
    <div class="nav-section">Manage</div>
    <button class="nav-item" data-pg="initiatives" onclick="go('initiatives')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      <span class="nav-lbl">Initiatives</span>
    </button>
    <button class="nav-item" data-pg="orgchart" onclick="go('orgchart')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 11h8M8 11v4M16 11v4"/><circle cx="8" cy="17" r="2"/><circle cx="16" cy="17" r="2"/></svg>
      <span class="nav-lbl">AI Agent Org</span>
    </button>
    <button class="nav-item" data-pg="voting" onclick="go('voting')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-6 0v4"/><path d="M5 12l2.5-2L10 12l2.5-2L15 12l2.5-2L20 12v7a2 2 0 01-2 2H7a2 2 0 01-2-2v-7z"/></svg>

function lsSave(){
  const d={overrides:S.overrides,votes:S.votes,voterName:S.voterName,votesUsed:S.votesUsed};
  try{localStorage.setItem('tc_air3',JSON.stringify(d));}catch(e){}
}
function lsLoad(){
  try{

    if(d.overrides)S.overrides=d.overrides;

function initItems(){
  const all=[...RAW_BD,...RAW_MKT,...RAW_SAL,...RAW_STR];
  S.items=all.map(raw=>{
    const cl=CLUSTERS.find(c=>c.id===raw.cluster)||CLUSTERS[0];
    const ov=S.overrides[raw.id]||{};
    return {
      ...raw,
      clusterName:cl.name,
      // scoring dims
      impact:ov.impact!==undefined?ov.impact:cl.impact,
      feasibility:ov.feasibility!==undefined?ov.feasibility:cl.feasibility,
      readiness:ov.readiness!==undefined?ov.readiness:3,
      crossTeam:ov.crossTeam!==undefined?ov.crossTeam:3,
      // new planning fields
      commercialImpact:ov.commercialImpact!==undefined?ov.commercialImpact:3,
      hoursSaved:ov.hoursSaved!==undefined?ov.hoursSaved:0,
      resourceEffort:ov.resourceEffort!==undefined?ov.resourceEffort:3,
      startDate:ov.startDate||'',
      endDate:ov.endDate||'',
      stage:ov.stage||'Backlog',
    };
  });
}

function saveItemField(id,field,val){
  const it=S.items.find(i=>i.id===id);if(!it)return;
  it[field]=val;
  if(!S.overrides[id])S.overrides[id]={};
  S.overrides[id][field]=val;
  lsSave();
}

// HELPERS
// ═══════════════════════════════════════════════════
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function avg(it){return(((it.impact+it.feasibility+it.readiness+it.crossTeam)/4)).toFixed(1);}
function priorityScore(it){return(((it.commercialImpact*2)+Math.min(it.hoursSaved||0,5))/it.resourceEffort).toFixed(1);}
function votes(id){return S.votes[id]||0;}
function byCluster(cid){return S.items.filter(i=>i.cluster===cid);}

function stagePill(stage){
  const cls=STAGE_CLASS[stage]||'sg-backlog';
  return `<span class="stage-pill ${cls}"><span class="s-dot"></span>${stage}</span>`;
}
function tBadge(team){
  const cls={'BizDev':'tb-bizdev','Marketing':'tb-marketing','Sales':'tb-sales','Strategy':'tb-strategy'}[team]||'tb-bizdev';
  return `<span class="team-badge ${cls}">${team}</span>`;
}
function priBadge(p){
  const cls={'High':'pri-high','Medium':'pri-medium','Low':'pri-low'}[p]||'pri-low';
  return `<span class="pri-badge ${cls}">${p}</span>`;
}
function scBadge(v){
  const n=parseFloat(v);
  const cls=n>=3.5?'sc-hi':n>=2.5?'sc-mid':'sc-lo';
  return `<span class="score-badge ${cls}">${v}</span>`;
}
function psBadge(it){
  const ps=parseFloat(priorityScore(it));
  const cls=ps>=3?'sc-hi':ps>=2?'sc-mid':'sc-lo';
  return `<span class="score-badge ${cls}">${priorityScore(it)}</span>`;
}
function impPill(v){return `<span class="imp-pill imp-${v}">${IMP_LABELS[v]||v}</span>`;}
function effPill(v){return `<span class="eff-pill eff-${v}">${EFF_LABELS[v]||v}</span>`;}
function isQuickWin(it){return it.commercialImpact>=3&&it.resourceEffort<=2;}

function progColor(sc){
  if(sc>=4)return'#22C55E';
  if(sc>=3)return'#3B82F6';
  if(sc>=2)return'#F59E0B';
  return'#EF4444';
}

function filtered(){
  let items=[...S.items];
  const {team,cluster,stage,q,alignment}=S.filters;
  if(team)items=items.filter(i=>i.team===team);
  if(cluster)items=items.filter(i=>i.cluster==cluster);
  if(stage)items=items.filter(i=>i.stage===stage);
  if(alignment)items=items.filter(i=>hasTag(i,alignment));
  if(q){const lq=q.toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(lq)||i.id.toLowerCase().includes(lq)||(i.submitter||'').toLowerCase().includes(lq));}
  return items;
}

function stageColors(stage){return STAGE_COLORS[stage]||'#94A3B8';}

// Month columns for Gantt: Apr 2026 – Mar 2027
const GANTT_MONTHS=['Apr 26','May 26','Jun 26','Jul 26','Aug 26','Sep 26','Oct 26','Nov 26','Dec 26','Jan 27','Feb 27','Mar 27'];
const GANTT_START=new Date(2026,3,1); // April 2026
const GANTT_END=new Date(2027,3,1);   // April 2027
const GANTT_TOTAL_MS=GANTT_END-GANTT_START;

function dateToGanttPct(dateStr){
  if(!dateStr)return null;
  const d=new Date(dateStr);
  if(isNaN(d))return null;
  const pct=(d-GANTT_START)/GANTT_TOTAL_MS*100;
  return Math.max(0,Math.min(100,pct));
}

function buildDonut(data,colors){
  const tot=Object.values(data).reduce((a,b)=>a+b,0);
  if(!tot)return'<svg width="140" height="140"><text x="70" y="75" text-anchor="middle" fill="#9CA3AF" font-size="13">No data</text></svg>';
  const r=50,cx=70,cy=70,sw=20,circ=2*Math.PI*r;
  let cum=0,paths='';
  for(const[k,v]of Object.entries(data)){
    if(!v)continue;
    const pct=v/tot;const off=circ*(1-pct);const rot=cum*360-90;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[k]||'#94A3B8'}" stroke-width="${sw}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(${rot} ${cx} ${cy})"/>`;
    cum+=pct;
  }
  return `<svg width="140" height="140" viewBox="0 0 140 140">${paths}<text x="${cx}" y="${cy+2}" text-anchor="middle" dominant-baseline="central" font-size="20" font-weight="800" fill="${'#1E3A5F'}">${tot}</text></svg>`;
}

function renderClCard(cluster){
  let items=byCluster(cluster.id);
  const {team,stage,q,alignment}=S.filters;
  if(team)items=items.filter(i=>i.team===team);
  if(stage)items=items.filter(i=>i.stage===stage);
  if(alignment)items=items.filter(i=>hasTag(i,alignment));
  if(q){const lq=q.toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(lq)||cluster.name.toLowerCase().includes(lq));}
  if(!items.length&&(team||stage||q||alignment))return'';
  const open=!!S.expanded[cluster.id];
  const avgSc=((items.reduce((a,i)=>a+parseFloat(avg(i)),0)/(items.length||1))).toFixed(1);
  const teams=[...new Set(items.map(i=>i.team))];
  const hrs=items.reduce((a,i)=>a+(Number(i.hoursSaved)||0),0);
  // alignment tag mini-counts
  const tagCounts={};
  items.forEach(i=>(SA_MAP[i.id]||[]).forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1;}));
  const tagSnippet=['tsunami','foundations','scale','net-new']
    .filter(t=>tagCounts[t])
    .map(t=>`<span style="font-size:9.5px;font-weight:700;" class="sa-pill ${SA_META[t].cls}">${SA_META[t].short}${tagCounts[t]}</span>`)
    .join('');
  return `<div class="cl-card${open?' open':''}" onclick="toggleCl(${cluster.id})">
    <div class="cl-top"><span>${cluster.icon} ${cluster.name}</span><span class="cl-arr">&#9654;</span></div>
    <div class="cl-meta">
      <span style="font-size:11px;color:var(--text-2)">${items.length} items</span>
      ${teams.map(t=>tBadge(t)).join('')}
      ${scBadge(avgSc)}
      ${hrs>0?`<span style="font-size:10px;color:var(--teal);font-weight:600">${hrs}h/wk</span>`:''}
    </div>
    ${tagSnippet?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">${tagSnippet}</div>`:''}
    <div class="cl-prog"><div class="cl-prog-fill" style="width:${(cluster.score/5*100).toFixed(0)}%;background:${progColor(cluster.score)}"></div></div>
    ${open?`<div class="cl-items">${items.map(it=>`<div class="cl-item-row" onclick="event.stopPropagation();openDrawer('${it.id}')">
      <span class="iid">${it.id}</span>
      <span class="inm" title="${esc(it.name)}">${esc(it.name)}</span>
      ${stagePill(it.stage)}
    </div>`).join('')}</div>`:''}
  </div>`;
}

function toggleCl(id){S.expanded[id]=!S.expanded[id];renderRoadmap();}

function renderGanttView(){
  const items=S.items.filter(i=>i.startDate&&i.endDate);
  const unscheduled=S.items.filter(i=>!i.startDate||!i.endDate);
  // group scheduled by cluster
  const byCl={};
  items.forEach(it=>{
    if(!byCl[it.cluster])byCl[it.cluster]=[];
    byCl[it.cluster].push(it);
  });
  const todayPct=dateToGanttPct(new Date().toISOString().slice(0,10));

  let rows='';
  CLUSTERS.forEach(cl=>{
    const clItems=byCl[cl.id]||[];
    const hrs=clItems.reduce((a,i)=>a+(Number(i.hoursSaved)||0),0);
    rows+=`<div class="gantt-row">
      <div class="gantt-row-label cluster-head" onclick="S.expanded['g'+${cl.id}]=!S.expanded['g'+${cl.id}];renderRoadmap()">
        ${cl.icon} ${cl.name} <span style="font-size:10px;color:var(--text-2);font-weight:400">${clItems.length} items${hrs>0?' · '+hrs+'h/wk':''}</span>
      </div>
      <div class="gantt-timeline" style="position:relative">
        ${todayPct!==null?`<div class="gantt-today-line" style="left:${todayPct}%"></div>`:''}
      </div>
    </div>`;
    if(S.expanded['g'+cl.id]){
      clItems.forEach(it=>{
        const sp=dateToGanttPct(it.startDate);
        const ep=dateToGanttPct(it.endDate);
        const w=ep!==null&&sp!==null?Math.max(2,ep-sp):0;
        rows+=`<div class="gantt-row">
          <div class="gantt-row-label" style="padding-left:24px;font-size:11px" title="${esc(it.name)}">${esc(it.name.length>28?it.name.slice(0,28)+'…':it.name)}</div>
          <div class="gantt-timeline" style="position:relative">
            ${todayPct!==null?`<div class="gantt-today-line" style="left:${todayPct}%;z-index:3"></div>`:''}
            ${sp!==null&&ep!==null?`<div class="gantt-bar" style="left:${sp}%;width:${w}%;background:${stageColors(it.stage)}" onclick="openDrawer('${it.id}')" title="${esc(it.name)}">${it.name.length>20?it.name.slice(0,20)+'…':esc(it.name)}</div>`:''}
          </div>
        </div>`;
      });
    }
  });

  return `
<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
  <span style="font-size:13px;color:var(--text-2)">Set Start/End dates on initiatives to populate the timeline. Bar colors = lifecycle stage.</span>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:auto">
    ${STAGES.map(s=>`<span style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:${stageColors(s)}"><span style="width:8px;height:8px;border-radius:2px;background:${stageColors(s)}"></span>${s}</span>`).join('')}
  </div>
</div>
<div class="gantt-wrap">
  <div class="gantt-header">
    <div class="gantt-label-col">Cluster / Initiative</div>
    <div class="gantt-months">${GANTT_MONTHS.map(m=>`<div class="gantt-month">${m}</div>`).join('')}</div>
  </div>
  ${rows||'<div style="padding:30px;text-align:center;color:var(--text-2);font-size:13px">No items have Start + End dates set yet. Open any initiative and set dates in the Overview tab.</div>'}
</div>
${unscheduled.length?`<div class="unscheduled-section">
  <h4>Unscheduled (${unscheduled.length} items — no start/end date)</h4>
  <div style="display:flex;flex-wrap:wrap;gap:6px">
    ${unscheduled.slice(0,40).map(it=>`<span class="stage-pill sg-backlog" style="cursor:pointer" onclick="openDrawer('${it.id}')" title="${esc(it.name)}">${esc(it.name.length>30?it.name.slice(0,30)+'…':it.name)}</span>`).join('')}
    ${unscheduled.length>40?`<span style="font-size:11px;color:var(--text-2)">+${unscheduled.length-40} more</span>`:''}
  </div>
</div>`:''}`;
}

// ── TABLE VIEW ──────────────────────────────────────
function renderTableView(){
  let items=filtered();
  if(S.sortCol){
    items.sort((a,b)=>{
      let va=a[S.sortCol],vb=b[S.sortCol];
      if(S.sortCol==='pscore'){va=parseFloat(priorityScore(a));vb=parseFloat(priorityScore(b));}
      if(S.sortCol==='avgscore'){va=parseFloat(avg(a));vb=parseFloat(avg(b));}
      if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}
      if(va<vb)return S.sortDir==='asc'?-1:1;
      if(va>vb)return S.sortDir==='asc'?1:-1;
      return 0;
    });
  }
  const sc=col=>S.sortCol===col?(S.sortDir==='asc'?'s-asc':'s-desc'):'';
  return `${filterBar("renderInitiatives();")}
<div class="card" style="overflow-x:auto">
  <table class="tbl">
    <thead><tr>
      <th class="${sc('id')}" onclick="sortBy('id','initiatives')">ID</th>
      <th class="${sc('name')}" onclick="sortBy('name','initiatives')">Name</th>
      <th class="${sc('clusterName')}" onclick="sortBy('clusterName','initiatives')">Cluster</th>
      <th class="${sc('team')}" onclick="sortBy('team','initiatives')">Team</th>
      <th class="${sc('submitter')}" onclick="sortBy('submitter','initiatives')">Submitter</th>
      <th class="${sc('commercialImpact')}" onclick="sortBy('commercialImpact','initiatives')">Impact</th>
      <th class="${sc('hoursSaved')}" onclick="sortBy('hoursSaved','initiatives')">Hrs/Wk</th>
      <th class="${sc('resourceEffort')}" onclick="sortBy('resourceEffort','initiatives')">Effort</th>
      <th class="${sc('pscore')}" onclick="sortBy('pscore','initiatives')">P.Score</th>
      <th>Start</th>
      <th>End</th>
      <th class="${sc('stage')}" onclick="sortBy('stage','initiatives')">Stage</th>
    </tr></thead>
    <tbody>
      ${items.map(it=>`<tr onclick="openDrawer('${it.id}')">
        <td style="font-family:monospace;font-size:10px;color:var(--text-2)">${it.id}</td>
        <td class="nm" title="${esc(it.name)}">${esc(it.name.length>40?it.name.slice(0,40)+'…':it.name)}</td>
        <td style="font-size:11px;color:var(--text-2)">${esc(it.clusterName)}</td>
        <td>${tBadge(it.team)}</td>
        <td style="font-size:11px;color:var(--text-2)">${esc(it.submitter)}</td>
        <td onclick="event.stopPropagation()">${renderScaleBtns(it,'commercialImpact','imp')}</td>
        <td onclick="event.stopPropagation()"><input class="hrs-input" type="number" min="0" max="999" value="${it.hoursSaved||0}" onchange="saveItemField('${it.id}','hoursSaved',+this.value);renderInitiatives()"></td>
        <td onclick="event.stopPropagation()">${renderScaleBtns(it,'resourceEffort','eff')}</td>
        <td>${psBadge(it)}</td>
        <td onclick="event.stopPropagation()"><input class="date-input" type="date" value="${it.startDate||''}" onchange="saveItemField('${it.id}','startDate',this.value)"></td>
        <td onclick="event.stopPropagation()"><input class="date-input" type="date" value="${it.endDate||''}" onchange="saveItemField('${it.id}','endDate',this.value)"></td>
        <td onclick="event.stopPropagation()">${renderStageSelect(it)}</td>
      </tr>`).join('')}
    </tbody>
  </table>
</div>
<script>document.getElementById('filtCount')&&(document.getElementById('filtCount').textContent=\`${items.length} of ${S.items.length} items\`);<\/script>`;
}

function renderScaleBtns(it,field,type){
  const val=it[field]||3;
  return `<div class="scale-btns">${[1,2,3,4,5].map(n=>`<button class="scale-btn${val===n?' active-'+type+'-'+n:''}" onclick="saveItemField('${it.id}','${field}',${n});renderInitiatives()">${n}</button>`).join('')}</div>`;
}

function renderStageSelect(it){
  return `<select class="stage-select" onchange="saveItemField('${it.id}','stage',this.value);renderInitiatives()" style="border-left:3px solid ${stageColors(it.stage)}">
    ${STAGES.map(s=>`<option value="${s}" ${it.stage===s?'selected':''}>${s}</option>`).join('')}
  </select>`;
}

function sortBy(col,pg){
  S.sortDir=(S.sortCol===col&&S.sortDir==='asc')?'desc':'asc';
  S.sortCol=col;
  if(pg==='initiatives')renderInitiatives();
  if(pg==='register')renderRegister();
}

// ── MATRIX VIEW ─────────────────────────────────────
function renderMatrixView(){
  const items=filtered();
  // quadrant counts
  const qc={qw:0,sb:0,fi:0,dp:0};
  items.forEach(it=>{
    const imp=it.commercialImpact;const eff=it.resourceEffort;
    if(imp>=3&&eff<=2.5)qc.qw++;
    else if(imp>=3&&eff>2.5)qc.sb++;
    else if(imp<3&&eff<=2.5)qc.fi++;
    else qc.dp++;
  });
  return `${filterBar("renderInitiatives();")}
<div class="matrix-wrap" style="padding:20px;margin-bottom:12px">
  <div style="text-align:center;margin-bottom:8px;font-size:12px;color:var(--text-2)">Size = hours saved/week &nbsp;·&nbsp; Color = lifecycle stage</div>
  <div class="matrix-inner" id="matrixInner" style="position:relative;height:460px">
    <div class="quadrant q-tl"><div class="q-label">⚡ QUICK WINS <span class="matrix-q-count">${qc.qw}</span></div></div>
    <div class="quadrant q-tr"><div class="q-label">🎯 STRATEGIC BETS <span class="matrix-q-count">${qc.sb}</span></div></div>
    <div class="quadrant q-bl"><div class="q-label">📋 FILL-INS <span class="matrix-q-count">${qc.fi}</span></div></div>
    <div class="quadrant q-br"><div class="q-label">⛔ DEPRIORITISE <span class="matrix-q-count">${qc.dp}</span></div></div>
    <!-- Axis labels -->
    <div class="matrix-axis-lbl" style="bottom:-32px;left:50%;transform:translateX(-50%)">→ Resource Effort (1=Low, 5=High)</div>
    <div class="matrix-axis-lbl" style="left:-42px;top:50%;transform:rotate(-90deg) translateX(-50%)">↑ Commercial Impact</div>
    <!-- Dots -->
    ${items.map(it=>{
      const xp=((it.resourceEffort-1)/4*92+4).toFixed(1);
      const yp=(100-(it.commercialImpact-1)/4*92-4).toFixed(1);
      const size=Math.max(10,Math.min(28,10+(it.hoursSaved||0)*2));
      const col=stageColors(it.stage);
      return `<div class="matrix-dot" style="left:calc(${xp}% - ${size/2}px);top:calc(${yp}% - ${size/2}px);width:${size}px;height:${size}px;background:${col};font-size:${size>18?'9':'7'}px;" onclick="openDrawer('${it.id}')" onmouseenter="showMatrixTT(event,'${esc(it.id)}','${esc(it.name.replace(/'/g,"&#39;"))}',${it.commercialImpact},${it.resourceEffort},${it.hoursSaved||0},'${it.stage}')" onmouseleave="hideMatrixTT()"></div>`;
    }).join('')}
  </div>
</div>
<div id="matrixTT" class="tt" style="display:none;position:fixed;pointer-events:none;z-index:999"></div>`;
}

function showMatrixTT(e,id,name,imp,eff,hrs,stage){
  const tt=document.getElementById('matrixTT');
  if(!tt)return;
  tt.innerHTML=`<div class="tt-title">${name}</div><div>Impact: ${imp} · Effort: ${eff} · ${hrs}h/wk</div><div>Stage: ${stage}</div>`;
  tt.style.display='block';
  tt.style.left=(e.clientX+12)+'px';
  tt.style.top=(e.clientY-10)+'px';
}
function hideMatrixTT(){const tt=document.getElementById('matrixTT');if(tt)tt.style.display='none';}

// ── PIPELINE / KANBAN VIEW ──────────────────────────
function renderPipelineView(){
  const items=filtered();
  return `${filterBar("renderInitiatives();")}
<div class="kanban-wrap">
  ${STAGES.map(stage=>{
    const col=items.filter(i=>i.stage===stage);
    const hrs=col.reduce((a,i)=>a+(Number(i.hoursSaved)||0),0);
    return `<div class="kanban-col">
      <div class="kanban-head">
        <div class="kanban-head-title"><div class="kanban-head-dot" style="background:${stageColors(stage)}"></div>${stage}</div>
        <div class="kanban-head-meta">${col.length}${hrs>0?' · '+hrs+'h':''}</div>
      </div>
      <div class="kanban-body">
        ${col.map(it=>{
          const stIdx=STAGES.indexOf(it.stage);
          const canLeft=stIdx>0;const canRight=stIdx<STAGES.length-1;
          return `<div class="kanban-card" onclick="openDrawer('${it.id}')">
            <div class="kanban-card-name">${esc(it.name.length>50?it.name.slice(0,50)+'…':it.name)}</div>
            <div class="kanban-card-meta">
              ${tBadge(it.team)}
              ${psBadge(it)}
            </div>
            <div class="kanban-card-arrows" onclick="event.stopPropagation()">
              ${canLeft?`<button class="arrow-btn" title="Move left" onclick="moveStage('${it.id}',-1)">←</button>`:'<span style="width:29px"></span>'}
              ${canRight?`<button class="arrow-btn" title="Move right" onclick="moveStage('${it.id}',1)">→</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}
</div>`;
}

function moveStage(id,dir){
  const it=S.items.find(i=>i.id===id);if(!it)return;
  const idx=STAGES.indexOf(it.stage);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=STAGES.length)return;
  saveItemField(id,'stage',STAGES[newIdx]);
  renderInitiatives();
}

function startVote(){
  const n=(document.getElementById('vnInput').value||'').trim();
  if(!n)return;
  S.voterName=n;lsSave();renderVoting();
}

function castVote(id){
  if(S.votesUsed>=S.maxVotes)return;
  S.votes[id]=(S.votes[id]||0)+1;S.votesUsed++;
  lsSave();
  if(S.curPage==='voting')renderVoting();
  if(S.drawerItem&&S.drawerTab==='scoring')renderDrBody();
}

function renderScatter(){
  const wrap=document.getElementById('scatterWrap');if(!wrap)return;
  const COLS=['#2563EB','#22C55E','#F59E0B','#8B5CF6','#EF4444','#06B6D4','#EC4899','#14B8A6','#F97316','#6366F1','#65A30D','#A855F7'];
  let html='';
  html+=`<div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--text-2)">Feasibility →</div>`;
  html+=`<div style="position:absolute;left:4px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:9px;font-weight:600;color:var(--text-2)">Impact →</div>`;
  [1,2,3,4,5].forEach(v=>{
    const xp=(v/6*100).toFixed(0);const yp=(100-v/6*100).toFixed(0);
    html+=`<div style="position:absolute;left:${xp}%;top:6px;bottom:22px;width:1px;background:var(--border)"></div>`;
    html+=`<div style="position:absolute;top:${yp}%;left:22px;right:6px;height:1px;background:var(--border)"></div>`;
    html+=`<div style="position:absolute;left:${xp}%;bottom:12px;font-size:8px;color:var(--text-2);transform:translateX(-50%)">${v}</div>`;
    html+=`<div style="position:absolute;top:${yp}%;left:6px;font-size:8px;color:var(--text-2);transform:translateY(-50%)">${v}</div>`;
  });
  CLUSTERS.forEach((c,i)=>{
    const xp=(c.feasibility/6*100).toFixed(1);
    const yp=(100-c.impact/6*100).toFixed(1);
    html+=`<div class="scatter-dot" style="left:calc(${xp}% - 15px);top:calc(${yp}% - 15px);width:30px;height:30px;background:${COLS[i]};font-size:9px" title="${c.name}">${c.id}</div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll('.scatter-dot').forEach(d=>{
    d.addEventListener('mouseenter',()=>{
      const t=document.createElement('div');
      t.className='tt';t.style.cssText='position:absolute;top:-36px;left:50%;transform:translateX(-50%);white-space:nowrap';
      t.textContent=d.title;d.appendChild(t);
    });
    d.addEventListener('mouseleave',()=>d.querySelectorAll('.tt').forEach(e=>e.remove()));
  });
}

function openDrawer(id){
  const item=S.items.find(i=>i.id===id);if(!item)return;
  S.drawerItem=item;
  if(!S.drawerTab)S.drawerTab='overview';
  document.getElementById('drTitle').textContent=item.name;
  renderDrBadges();
  document.querySelectorAll('.dr-tab').forEach(t=>t.classList.toggle('active',t.dataset.dt===S.drawerTab));
  renderDrBody();
  document.getElementById('DWR').classList.add('on');
  document.getElementById('OVL').classList.add('on');
}

function closeDrawer(){
  document.getElementById('DWR').classList.remove('on');
  document.getElementById('OVL').classList.remove('on');
}

function setDT(tab){
  S.drawerTab=tab;
  document.querySelectorAll('.dr-tab').forEach(t=>t.classList.toggle('active',t.dataset.dt===tab));

}

        <div class="qw-box"><div class="qw-lbl">⚡ Quick Win Alternative</div><div class="qw-txt">${esc(bp.quickWin||'Start with a manual prototype to prove value.')}</div></div>
      `;
      break;

    case 'scoring':{
      const dims=[
        {k:'impact',lbl:'Impact',col:'var(--primary)'},
        {k:'feasibility',lbl:'Feasibility',col:'var(--success)'},
        {k:'readiness',lbl:'Readiness',col:'var(--warning)'},
        {k:'crossTeam',lbl:'Cross-Team',col:'var(--purple)'},
      ];
      body.innerHTML=`
        <div style="font-size:11.5px;color:var(--text-2);margin-bottom:14px">Click a score bar to set value (1–5). Saved automatically.</div>
        ${dims.map(d=>`<div class="sc-row">
          <div class="sc-row-lbl">${d.lbl}</div>
          <div class="sc-bar-bg" onclick="setScore('${it.id}','${d.k}',event)">
            <div class="sc-bar-fill" style="width:${it[d.k]*20}%;background:${d.col}"></div>
          </div>
          <div class="sc-num" id="sc-num-${d.k}">${it[d.k]}</div>
        </div>`).join('')}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <span style="font-weight:600;font-size:13.5px">Composite Score</span>
          <span style="font-size:26px;font-weight:800;color:var(--primary)">${avg(it)}</span>
        </div>
        <div class="dr-sep"></div>
        ${S.voterName
          ?`<div style="display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-size:13.5px;font-weight:600">Vote for This Initiative</div>
                <div style="font-size:11.5px;color:var(--text-2);margin-top:2px">${votes(it.id)} vote${votes(it.id)!==1?'s':''} total</div>
              </div>
              <button class="vote-btn${votes(it.id)?' voted':''}" onclick="castVote('${it.id}')" ${S.votesUsed>=S.maxVotes&&!votes(it.id)?'disabled':''}>
                Vote (${S.maxVotes-S.votesUsed} left)
              </button>
            </div>`
          :`<div style="font-size:12px;color:var(--text-2)">Go to the <a href="#" onclick="closeDrawer();go('voting')" style="color:var(--primary)">Voting page</a> to set your name and vote.</div>`}
      `;
      break;
    }

    case 'activity':
      body.innerHTML=`
        <div style="text-align:center;padding:30px 0 20px;color:var(--text-2)">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 10px;display:block;opacity:.2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <div style="font-size:14px;font-weight:600;margin-bottom:4px;color:var(--text)">Activity Timeline</div>
          <div style="font-size:12.5px">Status changes and votes will appear here as the roadmap evolves.</div>
          ${votes(it.id)?`<div style="margin-top:14px;padding:8px 14px;background:var(--primary-light);border-radius:var(--r);display:inline-block;font-size:12.5px"><strong>${votes(it.id)}</strong> vote${votes(it.id)!==1?'s':''} cast</div>`:''}
        </div>
        <div class="dr-sep"></div>
        <div class="dr-field"><div class="dr-lbl">Current Stage</div><div class="dr-val" style="margin-top:3px">${stagePill(it.stage)}</div></div>
        <div class="dr-field"><div class="dr-lbl">Priority Score</div><div class="dr-val"><strong style="font-size:20px;color:var(--primary)">${priorityScore(it)}</strong></div></div>
        ${cl?`<div class="dr-field"><div class="dr-lbl">Cluster</div><div class="dr-val">${cl.icon} ${cl.name} · ${it.horizon}</div></div>`:''}
      `;
      break;
  }
}

function setScore(id,dim,e){
  const item=S.items.find(i=>i.id===id);if(!item)return;
  const bar=e.currentTarget;const rect=bar.getBoundingClientRect();
  const nv=Math.max(1,Math.min(5,Math.ceil((e.clientX-rect.left)/rect.width*5)));
  item[dim]=nv;
  if(!S.overrides[id])S.overrides[id]={};
  S.overrides[id][dim]=nv;
  S.drawerItem=item;lsSave();
  renderDrBody();renderDrBadges();
}

function toggleDD(e){
  e.stopPropagation();
  document.getElementById('stageDD').classList.toggle('on');
}

function refreshCurrentPage(){
  if(S.curPage==='initiatives')renderInitiatives();
  if(S.curPage==='roadmap')renderRoadmap();
  if(S.curPage==='register')renderRegister();
}

document.addEventListener('click',()=>{
  const dd=document.getElementById('stageDD');if(dd)dd.classList.remove('on');
});

// ═══════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════
function exportCSV(){
  const hdrs=['ID','Name','Cluster','Team','Submitter','Priority','Horizon','Stage','Commercial Impact','Hours Saved (wk)','Resource Effort','Priority Score','Start Date','End Date','Composite Score','Current Approach','AI Opportunity','Expected Benefit'];
  const rows=S.items.map(i=>[
    i.id,
    `"${(i.name||'').replace(/"/g,'""')}"`,
    `"${(i.clusterName||'').replace(/"/g,'""')}"`,
    i.team,
    `"${(i.submitter||'').replace(/"/g,'""')}"`,
    i.priority,i.horizon,i.stage,
    i.commercialImpact,i.hoursSaved||0,i.resourceEffort,priorityScore(i),
    i.startDate||'',i.endDate||'',
    avg(i),
    `"${(i.current||'').replace(/"/g,'""')}"`,
    `"${(i.opportunity||'').replace(/"/g,'""')}"`,
    `"${(i.benefit||'').replace(/"/g,'""')}"`
  ]);
  const csv=[hdrs.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=Object.assign(document.createElement('a'),{href:'data:text/csv;charset=utf-8,'+encodeURIComponent(csv),download:'TC-AI-Roadmap-'+new Date().toISOString().slice(0,10)+'.csv'});
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

lsLoad();
initItems();
go('dashboard');
</script>
